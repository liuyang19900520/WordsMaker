name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/words-maker:latest
        run: |
          docker build --platform linux/amd64 -t $IMAGE_URI ./backend
          docker push $IMAGE_URI

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name words-maker-pipeline \
            --image-uri ${{ steps.ecr-login.outputs.registry }}/words-maker:latest \
            --region ap-northeast-1
